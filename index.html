<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anshika Pandey — AI & Data Science</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0d0d0d;
    --paper: #f5f2eb;
    --cream: #ede9df;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b85c38;
    --sage: #6b7c6b;
    --muted: #6b6560;
    --border: rgba(13,13,13,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom Cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
  }
  .cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
    opacity: 0.6;
  }

  /* Noise Texture Overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── NAVIGATION ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 500;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 3rem;
    mix-blend-mode: multiply;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .nav-links {
    display: flex; gap: 2.5rem;
    list-style: none;
  }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--muted);
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--ink); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 8rem 3rem 6rem 3rem;
    position: relative;
  }

  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 8vw, 7.5rem);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.5s forwards;
  }

  .hero-name em {
    font-style: italic;
    color: var(--rust);
    display: block;
  }

  .hero-desc {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.8;
    margin-top: 2rem;
    max-width: 380px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.7s forwards;
  }

  .hero-cta {
    display: flex; gap: 1rem;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.9s forwards;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center; gap: 0.6rem;
    padding: 0.85rem 2rem;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: none; cursor: none;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.35s ease;
  }
  .btn-primary:hover::after { transform: translateX(0); }
  .btn-primary span { position: relative; z-index: 1; }

  .btn-secondary {
    display: inline-flex;
    align-items: center; gap: 0.6rem;
    padding: 0.85rem 2rem;
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .btn-secondary:hover { border-color: var(--ink); background: var(--cream); }

  .hero-right {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8rem 3rem 6rem 1rem;
    position: relative;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.6s forwards;
  }

  /* Decorative visual element */
  .hero-visual {
    position: relative;
    width: 340px;
    height: 420px;
  }

  .hero-frame {
    position: absolute;
    inset: 0;
    border: 1px solid var(--border);
    background: var(--cream);
  }

  .hero-frame::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: -16px; bottom: -16px;
    border: 1px solid var(--gold-light);
    z-index: -1;
  }

  .hero-frame-inner {
    position: absolute;
    inset: 2rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .avatar-placeholder {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, #d4c5a9 0%, #c9b98a 50%, #b8a67a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .avatar-placeholder::before {
    content: 'AP';
    font-family: 'Cormorant Garamond', serif;
    font-size: 4.5rem;
    font-weight: 300;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.1em;
  }

  .avatar-placeholder::after {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .card-info {
    padding-top: 1.5rem;
  }

  .card-info h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
  }

  .card-info p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 1rem;
  }

  .badge {
    padding: 0.25rem 0.65rem;
    border: 1px solid var(--gold-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  .hero-scroll {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeIn 1s ease 1.5s forwards;
  }

  .hero-scroll span {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .scroll-line {
    width: 1px;
    height: 50px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollDown 2s ease-in-out infinite;
  }

  /* ── MARQUEE ── */
  .marquee-strip {
    background: var(--ink);
    padding: 0.9rem 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .marquee-inner {
    display: inline-block;
    animation: marquee 18s linear infinite;
  }

  .marquee-inner span {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--paper);
    padding: 0 2.5rem;
    opacity: 0.7;
  }

  .marquee-inner span.accent { color: var(--gold); opacity: 1; }

  /* ── SECTIONS COMMON ── */
  section { padding: 7rem 0; }

  .container {
    max-width: 1140px;
    margin: 0 auto;
    padding: 0 3rem;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .section-title em { font-style: italic; color: var(--rust); }

  /* ── ABOUT ── */
  .about { background: var(--cream); }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 5rem;
    align-items: start;
    margin-top: 4rem;
  }

  .about-stats {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .stat-item {
    padding: 2rem 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .stat-item:first-child { border-top: 1px solid var(--border); }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    color: var(--gold);
    min-width: 80px;
  }

  .stat-text { font-size: 0.85rem; color: var(--muted); font-weight: 300; line-height: 1.5; }

  .about-text p {
    font-size: 1.05rem;
    font-weight: 300;
    line-height: 1.9;
    color: #3a3632;
    margin-bottom: 1.5rem;
  }

  .about-text p strong {
    font-weight: 500;
    color: var(--ink);
  }

  .edu-card {
    margin-top: 2.5rem;
    padding: 1.8rem;
    border: 1px solid var(--border);
    background: var(--paper);
    position: relative;
  }

  .edu-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--gold);
  }

  .edu-card h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
  }

  .edu-card p {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .edu-degree {
    display: inline-block;
    margin-top: 0.8rem;
    padding: 0.3rem 0.8rem;
    background: rgba(201,168,76,0.1);
    border: 1px solid var(--gold-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ── SKILLS ── */
  .skills-intro {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
    margin-top: 4rem;
  }

  .skills-categories {
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }

  .skill-group h4 {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .skill-tag {
    padding: 0.45rem 1rem;
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    color: var(--ink);
    transition: all 0.25s ease;
    cursor: default;
  }

  .skill-tag:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .skill-tag.highlight {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .skill-tag.highlight:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }

  .skills-visual {
    position: relative;
  }

  .skills-chart {
    background: var(--cream);
    padding: 2rem;
    border: 1px solid var(--border);
  }

  .skills-chart h4 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 1.8rem;
  }

  .skill-bar-item {
    margin-bottom: 1.3rem;
  }

  .skill-bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .skill-bar-label span:first-child {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
  }

  .skill-bar-label span:last-child {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--gold);
  }

  .skill-bar-track {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .skill-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--rust));
    transform: scaleX(0);
    transform-origin: left;
    animation: fillBar 1.2s ease forwards;
  }

  /* ── PROJECTS ── */
  .projects { background: var(--cream); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 4rem;
  }

  .project-card {
    background: var(--paper);
    border: 1px solid var(--border);
    padding: 2rem;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    overflow: hidden;
  }

  .project-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .project-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  }

  .project-card:hover::before { opacity: 1; }

  .project-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--border);
    line-height: 1;
    margin-bottom: 1.5rem;
  }

  .project-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }

  .project-desc {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  .project-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .stack-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.55rem;
    border: 1px solid var(--gold-light);
    color: var(--gold);
    text-transform: uppercase;
  }

  /* ── CONTACT ── */
  .contact-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
    margin-top: 4rem;
  }

  .contact-text p {
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.9;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }

  .contact-links {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .contact-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--ink);
    transition: all 0.3s ease;
    group: true;
  }

  .contact-link:first-child { border-top: 1px solid var(--border); }

  .contact-link:hover { padding-left: 1rem; }

  .contact-link .link-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .contact-link .link-value {
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 400;
    transition: color 0.3s;
  }

  .contact-link:hover .link-value { color: var(--gold); }

  .contact-link .link-arrow {
    font-size: 0.9rem;
    transition: transform 0.3s;
    color: var(--muted);
  }

  .contact-link:hover .link-arrow { transform: translate(3px, -3px); color: var(--gold); }

  .contact-form-area {
    background: var(--cream);
    padding: 2.5rem;
    border: 1px solid var(--border);
  }

  .contact-form-area h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    margin-bottom: 2rem;
  }

  .form-group { margin-bottom: 1.2rem; }

  .form-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 0.8rem 1rem;
    background: var(--paper);
    border: 1px solid var(--border);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.3s;
    resize: none;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--gold);
  }

  .form-group textarea { height: 100px; }

  /* ── FOOTER ── */
  footer {
    background: var(--ink);
    color: var(--paper);
    padding: 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer .footer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.1em;
  }

  footer .footer-copy {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: rgba(245,242,235,0.4);
  }

  footer .footer-domain {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--gold);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  @keyframes scrollDown {
    0%, 100% { transform: scaleY(1); opacity: 1; }
    50% { transform: scaleY(0.4); opacity: 0.3; }
  }

  @keyframes fillBar {
    to { transform: scaleX(1); }
  }

  /* ── REVEAL ON SCROLL ── */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    nav { padding: 1.2rem 1.5rem; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; }
    .hero-right { display: none; }
    .hero-left { padding: 7rem 1.5rem 5rem; }
    .about-grid, .skills-intro, .contact-inner { grid-template-columns: 1fr; gap: 3rem; }
    .projects-grid { grid-template-columns: 1fr; }
    .container { padding: 0 1.5rem; }
    footer { flex-direction: column; gap: 1rem; text-align: center; }
  }
</style>
</head>
